<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role - AI Interview Simulator</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Animated Interview Scene Background - Moving Robots and Colored Dots -->
    <div class="bg-3d">
        <!-- Moving Colored Dots Background -->
        <div class="dots-3d">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <!-- Moving Robots -->
        <div class="moving-robot robot-1">🤖</div>
        <div class="moving-robot robot-2">👾</div>
        <div class="moving-robot robot-3">🤖</div>
        <div class="moving-robot robot-small">🤖</div>
        <div class="moving-robot robot-small">👾</div>
        
        <!-- Robot Interview Scene - Less Blur -->
        <div class="robot-interview-scene">
            <div class="interview-room-blurred">
                <div class="desk-3d-blurred">
                    <div class="desk-top-blurred"></div>
                    <div class="desk-leg-blurred left"></div>
                    <div class="desk-leg-blurred right"></div>
                </div>
                <div class="laptop-3d-blurred">
                    <div class="laptop-screen-blurred">
                        <div class="video-call-blurred">
                            <div class="interviewer-video-blurred"></div>
                            <div class="candidate-video-blurred"></div>
                        </div>
                    </div>
                    <div class="laptop-base-blurred"></div>
                </div>
                <div class="robot-assistant-blurred">
                    <div class="robot-head-blurred"></div>
                    <div class="robot-body-blurred"></div>
                    <div class="robot-arm-blurred left"></div>
                    <div class="robot-arm-blurred right"></div>
                </div>
                <div class="floating-icons-blurred">
                    <div class="icon-3d-blurred">👔</div>
                    <div class="icon-3d-blurred">💼</div>
                </div>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <h1>AI Interview<span>Smart</span></h1>
            </div>
            <div class="nav-menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="#" id="logoutBtn">Logout</a>
            </div>
        </div>
    </nav>

    <div class="role-select-container glass-card">
        <h2>Select Your Target Role</h2>
        <p>Choose the job role you want to practice for</p>
        
        <form id="roleForm" class="role-form">
            <div class="form-group">
                <label for="jobRole">Job Role</label>
                <select id="jobRole" name="jobRole" required>
                    <option value="" disabled selected>Select a role</option>
                    <option value="frontend">Frontend Developer</option>
                    <option value="backend">Backend Developer</option>
                    <option value="fullstack">Full Stack Developer</option>
                    <option value="devops">DevOps Engineer</option>
                    <option value="data">Data Scientist</option>
                    <option value="product">Product Manager</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="experience">Experience Level</label>
                <select id="experience" name="experience" required>
                    <option value="" disabled selected>Select experience level</option>
                    <option value="entry">Entry Level (0-2 years)</option>
                    <option value="mid">Mid Level (3-5 years)</option>
                    <option value="senior">Senior Level (6+ years)</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="difficulty">Difficulty</label>
                <select id="difficulty" name="difficulty" required>
                    <option value="" disabled selected>Select difficulty</option>
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            
            <button type="submit" class="btn-start">Start Interview</button>
        </form>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('roleForm').addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = 'interview.html';
        });
    </script>
</body>
</html>
